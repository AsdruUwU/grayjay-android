name: Compilar Grayjay

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar el código principal
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Forzar descarga de dependencias (Submódulos por HTTPS)
      run: |
        # Forzamos a Git a usar enlaces públicos en lugar de privados
        git config --global url."https://github.com/".insteadOf git@github.com:
        git config --global url."https://gitlab.futo.org/".insteadOf git@gitlab.futo.org:
        git config --global url."https://".insteadOf git://
        
        # Descargamos los submódulos manualmente
        git submodule update --init --recursive

    - name: Configurar Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Dar permisos al compilador
      run: chmod +x gradlew

    - name: Compilar el APK
      run: ./gradlew assembleDebug

    - name: Subir el APK para descargar
      uses: actions/upload-artifact@v4
      with:
        name: Grayjay-APK
        # Esto asegura que solo suba el APK final y no archivos intermedios basura
        path: 'app/build/outputs/apk/**/*.apk' 
        
