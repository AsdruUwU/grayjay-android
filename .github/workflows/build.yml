name: Compilar Grayjay

on:
  workflow_dispatch: # Esto permite ejecutar la compilación con un botón manual

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar el código
      uses: actions/checkout@v4

    - name: Configurar Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Dar permisos al compilador
      run: chmod +x gradlew

    - name: Compilar el APK
      run: ./gradlew assembleDebug

    - name: Subir el APK para descargar
      uses: actions/upload-artifact@v4
      with:
        name: Grayjay-APK
        path: '**/*.apk'
